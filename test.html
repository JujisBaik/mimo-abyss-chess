<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test MiMo Abyss Chess</title>
    <style>
      body { font-family: monospace; padding: 20px; background: #111; color: #fff; }
      .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
      .ok { background: #2a2; }
      .fail { background: #a22; }
    </style>
  </head>
  <body>
    <h1>Test MiMo Abyss Chess</h1>
    <div id="log"></div>
    <script>
      const log = (msg, ok) => {
        const div = document.createElement('div');
        div.className = 'status ' + (ok ? 'ok' : 'fail');
        div.textContent = msg;
        document.getElementById('log').appendChild(div);
      };
      try {
        log('✅ Page loaded', true);
        const root = document.getElementById('root');
        if (root) {
          log('✅ Root element exists', true);
        } else {
          log('❌ Root element missing', false);
        }
      } catch (e) {
        log('❌ Error: ' + e.message, false);
      }
    </script>
  </body>
</html>
