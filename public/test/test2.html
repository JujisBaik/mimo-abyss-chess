<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Manual Test - Click</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; }
      canvas { display: block; }
      #log { position: absolute; top: 10px; left: 10px; color: #fff; background: #0008; padding: 10px; font-family: monospace; }
    </style>
  </head>
  <body>
    <div id="log">Click in scene</div>
    <script>
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer();
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const geometry = new THREE.BoxGeometry(8, 0.2, 8);
      const material = new THREE.MeshBasicMaterial({ color: 0x333333 });
      const cube = new THREE.Mesh(geometry, material);
      cube.position.y = 0;
      scene.add(cube);

      camera.position.set(0, 10, 10);
      camera.lookAt(0, 0, 0);

      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();

      function onMouseClick(event) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(scene.children);
        
        if (intersects.length > 0) {
          const point = intersects[0].point;
          const log = document.getElementById('log');
          log.textContent = `Clicked at x=${point.x.toFixed(2)}, z=${point.z.toFixed(2)}`;
        }
      }

      window.addEventListener('click', onMouseClick);

      function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
      }
      animate();
    </script>
  </body>
</html>
