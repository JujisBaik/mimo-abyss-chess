<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Test Main (Current)</title>
    <script type="module" src="/src/main.tsx"></script>
    <style>
      html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #0a0a0f; }
      #log { position: absolute; bottom: 10px; left: 10px; color: #00ff00; font-family: monospace; font-size: 12px; background: #0008; padding: 5px; z-index: 9999; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="log">Initializing...</div>
    <script>
      // Capture console.log
      const log = document.getElementById('log');
      const originalLog = console.log;
      console.log = function(...args) {
        originalLog.apply(console, args);
        log.textContent = args.join(' ');
      };
    </script>
  </body>
</html>
